name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla_assistant:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'recheck' ||
       github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
      github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: signatures/cla.json
          path-to-document: https://github.com/jdavidaguil/nexari/blob/main/CLA.md
          branch: cla-signatures
          allowlist: jdavidaguil
          signed-commit-message: |
            $contributorName has signed the CLA in $owner/$repository#$pullRequestNo
          custom-notsigned-prcomment: |
            Thank you for your contribution to Nexari! 🎉

            Before we can merge this pull request, please sign our [Contributor License Agreement](https://github.com/jdavidaguil/nexari/blob/main/CLA.md).

            To sign, please add a comment below with the following text exactly:

            > I have read the CLA Document and I hereby sign the CLA
